{{ define "content" }}
<div class="auth-panel">
  <div class="auth-header">
    <h1>Bingo Kurulumu</h1>
    <p class="form-label" style="font-weight: normal; margin-top: 4px;">Kayıtları kapatmak için Süper Yönetici hesabını oluşturun.</p>
  </div>

  <div class="card">
    {{ if .Error }}
      <div class="alert alert-danger">{{ .Error }}</div>
    {{ end }}

    <form action="/register" method="POST">
      <div class="form-group">
        <label for="username" class="form-label">Kullanıcı Adı</label>
        <input type="text" id="username" name="username" class="form-input" placeholder="Örn: yonetici" required autofocus>
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Şifre</label>
        <input type="password" id="password" name="password" class="form-input" placeholder="En az 6 karakter" required>
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Yöneticiyi Oluştur ve Kayıtları Kapat</button>
    </form>
  </div>
</div>
{{ end }}
