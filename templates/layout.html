{{ define "layout" }}
<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .Title }}{{ .Title }}{{ else }}Bingo - Dosya Paylaşımı{{ end }}</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <script src="/static/js/app.js"></script>
</head>
<body>
  <div class="app-container">
    <header>
      <a href="/" class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
          <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
          <line x1="12" y1="22.08" x2="12" y2="12"></line>
        </svg>
        <span>Bingo</span>
      </a>
      <nav>
        {{ if .User }}
          <a href="/dashboard" class="mono-meta">Çalışma Alanı</a>
          <a href="/api" class="mono-meta">API</a>
          <span class="mono-meta" style="opacity: 0.6;">@{{ .User.Username }}</span>
          <a href="/logout" class="btn btn-sm">Çıkış Yap</a>
        {{ else }}
          <a href="/api" class="mono-meta">API</a>
          <a href="/login" class="btn btn-sm btn-primary">Giriş Yap</a>
        {{ end }}
      </nav>
    </header>

    <main>
      {{ template "content" . }}
    </main>

    <footer>
      <div>BINGO &copy; 2026</div>
      <div>SELF-HOSTED &middot; YÜKSEK PERFORMANS &middot; DÜŞÜK RAM</div>
    </footer>
  </div>
  
  <div id="toast-container"></div>
</body>
</html>
{{ end }}
