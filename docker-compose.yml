version: '3.8'

services:
  bingo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bingo_app
    environment:
      - PORT=8080
      - DB_PATH=/app/data/bingo.db
    volumes:
      # Persistent storage volumes for database and uploaded shares
      - ./data:/app/data
      - ./uploads:/app/uploads
    restart: unless-stopped
